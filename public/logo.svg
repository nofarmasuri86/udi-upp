<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- Puzzle piece icon -->
  <g transform="translate(260, 10)">
    <!-- Top-left piece -->
    <rect x="0" y="0" width="22" height="22" rx="2" fill="#6b6b6b"/>
    <circle cx="22" cy="11" r="5" fill="#6b6b6b"/>
    <circle cx="11" cy="22" r="5" fill="#6b6b6b"/>
    <!-- Top-right piece (red) -->
    <rect x="24" y="0" width="22" height="22" rx="2" fill="#8B1A1A"/>
    <circle cx="24" cy="11" r="5" fill="#8B1A1A"/>
    <!-- Bottom-left piece -->
    <rect x="0" y="24" width="22" height="22" rx="2" fill="#9a9a9a"/>
    <circle cx="11" cy="24" r="5" fill="#9a9a9a"/>
    <!-- Bottom-right piece -->
    <rect x="24" y="24" width="22" height="22" rx="2" fill="#7a7a7a"/>
    <circle cx="24" cy="35" r="5" fill="#7a7a7a"/>
  </g>
  <!-- Business name -->
  <text x="255" y="38" font-family="Rubik, Arial, sans-serif" font-size="32" font-weight="900" fill="#8B1A1A" text-anchor="end" direction="rtl">אודי הרכבות</text>
  <!-- Tagline -->
  <text x="255" y="58" font-family="Rubik, Arial, sans-serif" font-size="13" font-weight="400" fill="#444444" text-anchor="end" direction="rtl">התקנות, הרכבות ופירוק מכל הסוגים</text>
  <!-- Divider line -->
  <line x1="0" y1="68" x2="255" y2="68" stroke="#e5e5e5" stroke-width="1"/>
</svg>
